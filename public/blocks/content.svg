<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>
  
  <!-- Content Layout -->
  <g transform="translate(150, 60)">
    <!-- Heading -->
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0f172a">
      Content Section
    </text>
    
    <!-- Paragraph lines -->
    <rect x="0" y="80" width="500" height="12" rx="6" fill="#94a3b8"/>
    <rect x="0" y="110" width="480" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="0" y="140" width="490" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="0" y="170" width="460" height="12" rx="6" fill="#cbd5e1"/>
    
    <!-- Subheading -->
    <text x="0" y="230" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#334155">
      Subheading
    </text>
    
    <!-- More paragraph lines -->
    <rect x="0" y="260" width="500" height="12" rx="6" fill="#94a3b8"/>
    <rect x="0" y="290" width="470" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="0" y="320" width="480" height="12" rx="6" fill="#cbd5e1"/>
  </g>
</svg>

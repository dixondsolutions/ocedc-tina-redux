<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">
    Featured Properties
  </text>
  
  <!-- Property Cards -->
  <g transform="translate(75, 100)">
    <!-- Card 1 -->
    <rect width="310" height="280" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="15" y="15" width="280" height="160" rx="8" fill="#cbd5e1"/>
    <text x="155" y="110" font-family="Arial" font-size="14" fill="#64748b" text-anchor="middle">Property Image</text>
    <text x="20" y="200" font-family="Arial" font-size="18" font-weight="600" fill="#0f172a">Industrial Site</text>
    <text x="20" y="225" font-family="Arial" font-size="14" fill="#64748b">25 acres · Rail access</text>
    <rect x="20" y="240" width="100" height="24" rx="12" fill="#dbeafe"/>
    <text x="70" y="257" font-family="Arial" font-size="12" font-weight="600" fill="#2563eb" text-anchor="middle">Available</text>
    
    <!-- Card 2 -->
    <g transform="translate(345, 0)">
      <rect width="310" height="280" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="15" y="15" width="280" height="160" rx="8" fill="#cbd5e1"/>
      <text x="155" y="110" font-family="Arial" font-size="14" fill="#64748b" text-anchor="middle">Property Image</text>
      <text x="20" y="200" font-family="Arial" font-size="18" font-weight="600" fill="#0f172a">Commercial Building</text>
      <text x="20" y="225" font-family="Arial" font-size="14" fill="#64748b">50,000 sq ft · Utilities</text>
      <rect x="20" y="240" width="100" height="24" rx="12" fill="#dbeafe"/>
      <text x="70" y="257" font-family="Arial" font-size="12" font-weight="600" fill="#2563eb" text-anchor="middle">Available</text>
    </g>
  </g>
</svg>

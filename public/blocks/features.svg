<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">
    Key Features
  </text>
  
  <!-- Feature Cards -->
  <g transform="translate(100, 120)">
    <!-- Feature 1 -->
    <rect width="180" height="220" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="90" cy="60" r="30" fill="#dbeafe"/>
    <text x="90" y="120" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a" text-anchor="middle">Feature One</text>
    <rect x="40" y="140" width="100" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="30" y="155" width="120" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="50" y="170" width="80" height="6" rx="3" fill="#cbd5e1"/>
    
    <!-- Feature 2 -->
    <g transform="translate(210, 0)">
      <rect width="180" height="220" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <circle cx="90" cy="60" r="30" fill="#dcfce7"/>
      <text x="90" y="120" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a" text-anchor="middle">Feature Two</text>
      <rect x="40" y="140" width="100" height="6" rx="3" fill="#cbd5e1"/>
      <rect x="30" y="155" width="120" height="6" rx="3" fill="#cbd5e1"/>
      <rect x="50" y="170" width="80" height="6" rx="3" fill="#cbd5e1"/>
    </g>
    
    <!-- Feature 3 -->
    <g transform="translate(420, 0)">
      <rect width="180" height="220" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <circle cx="90" cy="60" r="30" fill="#ffedd5"/>
      <text x="90" y="120" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a" text-anchor="middle">Feature Three</text>
      <rect x="40" y="140" width="100" height="6" rx="3" fill="#cbd5e1"/>
      <rect x="30" y="155" width="120" height="6" rx="3" fill="#cbd5e1"/>
      <rect x="50" y="170" width="80" height="6" rx="3" fill="#cbd5e1"/>
    </g>
  </g>
</svg>

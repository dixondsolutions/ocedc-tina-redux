<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">
    Newsroom &amp; Resources
  </text>
  
  <!-- Category Filters -->
  <g transform="translate(180, 80)">
    <rect width="60" height="32" rx="16" fill="#3b82f6"/>
    <text x="30" y="21" font-family="Arial" font-size="13" fill="white" text-anchor="middle">All</text>
    
    <rect x="75" width="90" height="32" rx="16" fill="#e2e8f0"/>
    <text x="120" y="21" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Data Briefs</text>
    
    <rect x="180" width="90" height="32" rx="16" fill="#e2e8f0"/>
    <text x="225" y="21" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Plans</text>
    
    <rect x="285" width="110" height="32" rx="16" fill="#e2e8f0"/>
    <text x="340" y="21" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Profiles</text>
  </g>
  
  <!-- Resource Cards -->
  <g transform="translate(100, 140)">
    <!-- Card 1 -->
    <rect width="280" height="250" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="20" y="20" width="48" height="48" fill="#dbeafe" rx="8"/>
    <text x="44" y="53" font-family="Arial" font-size="24" text-anchor="middle">📄</text>
    <text x="20" y="90" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a">Community Profile</text>
    <text x="20" y="115" font-family="Arial" font-size="13" fill="#64748b">Demographics and</text>
    <text x="20" y="135" font-family="Arial" font-size="13" fill="#64748b">economic data for</text>
    <text x="20" y="155" font-family="Arial" font-size="13" fill="#64748b">Ogle County.</text>
    <rect x="20" y="175" width="120" height="32" rx="6" fill="#3b82f6"/>
    <text x="80" y="196" font-family="Arial" font-size="13" font-weight="600" fill="white" text-anchor="middle">Download PDF →</text>
    <text x="20" y="228" font-family="Arial" font-size="11" fill="#94a3b8">Updated: Mar 2024</text>
    
    <!-- Card 2 -->
    <g transform="translate(310, 0)">
      <rect width="280" height="250" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="20" y="20" width="48" height="48" fill="#dbeafe" rx="8"/>
      <text x="44" y="53" font-family="Arial" font-size="24" text-anchor="middle">📊</text>
      <text x="20" y="90" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a">Strategic Plan 2024</text>
      <text x="20" y="115" font-family="Arial" font-size="13" fill="#64748b">Five-year roadmap</text>
      <text x="20" y="135" font-family="Arial" font-size="13" fill="#64748b">for regional economic</text>
      <text x="20" y="155" font-family="Arial" font-size="13" fill="#64748b">development.</text>
      <rect x="20" y="175" width="120" height="32" rx="6" fill="#3b82f6"/>
      <text x="80" y="196" font-family="Arial" font-size="13" font-weight="600" fill="white" text-anchor="middle">Download PDF →</text>
      <text x="20" y="228" font-family="Arial" font-size="11" fill="#94a3b8">Updated: Jan 2024</text>
    </g>
  </g>
</svg>

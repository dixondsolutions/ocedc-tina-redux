<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#heroGrad)"/>
  
  <!-- Content -->
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
    Hero Headline
  </text>
  <text x="400" y="230" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1" text-anchor="middle">
    Engaging subtitle text goes here
  </text>
  
  <!-- Buttons -->
  <g transform="translate(260, 280)">
    <rect width="130" height="44" rx="22" fill="#3b82f6"/>
    <text x="65" y="28" font-family="Arial" font-size="14" font-weight="600" fill="white" text-anchor="middle">Get Started</text>
    
    <rect x="150" width="130" height="44" rx="22" fill="transparent" stroke="white" stroke-width="2"/>
    <text x="215" y="28" font-family="Arial" font-size="14" font-weight="600" fill="white" text-anchor="middle">Learn More</text>
  </g>
</svg>

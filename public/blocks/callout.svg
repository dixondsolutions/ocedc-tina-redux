<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>
  
  <!-- Callout Box -->
  <rect x="100" y="125" width="600" height="200" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  
  <!-- Icon -->
  <circle cx="400" cy="175" r="24" fill="#3b82f6"/>
  <text x="400" y="183" font-family="Arial" font-size="24" fill="white" text-anchor="middle">!</text>
  
  <!-- Text -->
  <text x="400" y="230" font-family="Arial" font-size="24" font-weight="bold" fill="#1e3a8a" text-anchor="middle">
    Important Callout Message
  </text>
  <text x="400" y="260" font-family="Arial" font-size="16" fill="#64748b" text-anchor="middle">
    Pay attention to this highlighted information.
  </text>
  
  <!-- Button -->
  <rect x="340" y="285" width="120" height="36" rx="18" fill="#3b82f6"/>
  <text x="400" y="308" font-family="Arial" font-size="14" font-weight="600" fill="white" text-anchor="middle">Action</text>
</svg>

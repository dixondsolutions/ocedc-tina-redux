<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">
    Board of Directors
  </text>
  
  <!-- Search and Filter -->
  <rect x="100" y="70" width="600" height="45" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="120" y="98" font-family="Arial" font-size="14" fill="#94a3b8">Search by name or organization</text>
  
  <!-- Board Member Cards -->
  <g transform="translate(100, 140)">
    <!-- Card 1 -->
    <rect width="280" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="60" cy="60" r="35" fill="#cbd5e1"/>
    <text x="60" y="71" font-family="Arial" font-size="22" fill="#64748b" text-anchor="middle">JD</text>
    <text x="110" y="40" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a">John Doe</text>
    <text x="110" y="62" font-family="Arial" font-size="13" fill="#64748b">President</text>
    <text x="110" y="80" font-family="Arial" font-size="12" fill="#94a3b8">ABC Corporation</text>
    <rect x="110" y="88" width="85" height="20" rx="10" fill="#dbeafe"/>
    <text x="152.5" y="102" font-family="Arial" font-size="11" font-weight="600" fill="#2563eb" text-anchor="middle">Public Sector</text>
    
    <!-- Card 2 -->
    <g transform="translate(310, 0)">
      <rect width="280" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <circle cx="60" cy="60" r="35" fill="#cbd5e1"/>
      <text x="60" y="71" font-family="Arial" font-size="22" fill="#64748b" text-anchor="middle">JS</text>
      <text x="110" y="40" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a">Jane Smith</text>
      <text x="110" y="62" font-family="Arial" font-size="13" fill="#64748b">Vice President</text>
      <text x="110" y="80" font-family="Arial" font-size="12" fill="#94a3b8">Local Business</text>
      <rect x="110" y="88" width="95" height="20" rx="10" fill="#dcfce7"/>
      <text x="157.5" y="102" font-family="Arial" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">Private Sector</text>
    </g>
  </g>
  
  <!-- More cards -->
  <g transform="translate(100, 280)">
    <rect width="280" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="60" cy="60" r="35" fill="#cbd5e1"/>
    <text x="60" y="71" font-family="Arial" font-size="22" fill="#64748b" text-anchor="middle">MJ</text>
    <text x="110" y="40" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a">Mike Johnson</text>
    <text x="110" y="62" font-family="Arial" font-size="13" fill="#64748b">Treasurer</text>
    <text x="110" y="80" font-family="Arial" font-size="12" fill="#94a3b8">City Council</text>
    
    <g transform="translate(310, 0)">
      <rect width="280" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <circle cx="60" cy="60" r="35" fill="#cbd5e1"/>
      <text x="60" y="71" font-family="Arial" font-size="22" fill="#64748b" text-anchor="middle">SW</text>
      <text x="110" y="40" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a">Sarah Williams</text>
      <text x="110" y="62" font-family="Arial" font-size="13" fill="#64748b">Secretary</text>
      <text x="110" y="80" font-family="Arial" font-size="12" fill="#94a3b8">Chamber Member</text>
    </g>
  </g>
</svg>
